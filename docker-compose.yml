# One-command local stack: qdrant + api + frontend.
#   docker compose up --build
# Secrets come from .env (see .env.example). QDRANT_URL is overridden to the
# service name so the api container talks to qdrant over the compose network.

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST/gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data   # reuse locally-built index; remove for a sealed image
    depends_on:
      qdrant:
        condition: service_healthy

  frontend:
    build: .
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api

volumes:
  qdrant_storage:
